name: Build Binaries

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build All Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows x64
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o neurabox-windows.exe cmd/nb/main.go

      - name: Build Linux x64
        run: GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o neurabox-linux cmd/nb/main.go

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o neurabox-linux-arm64 cmd/nb/main.go

      - name: Build macOS x64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o neurabox-macos cmd/nb/main.go

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o neurabox-macos-arm64 cmd/nb/main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurabox-binaries
          path: |
            neurabox-windows.exe
            neurabox-linux
            neurabox-linux-arm64
            neurabox-macos
            neurabox-macos-arm64
          if-no-files-found: error