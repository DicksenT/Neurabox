name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./internal

    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_name: neurabox-windows.exe
          - os: ubuntu-latest
            asset_name: neurabox-linux
          - os: macos-latest
            asset_name: neurabox-macos

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e . --system

      - name: Install PyInstaller
        run: uv pip install pyinstaller --system

      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: uv run pyinstaller --onefile --name neurabox_context --add-data "neuragraph;neuragraph" --clean --noupx neuragraph_ast.py

      - name: Build Binary (Linux & macOS)
        if: matrix.os != 'windows-latest'
        run: uv run pyinstaller --onefile --name neurabox_context --add-data "neuragraph:neuragraph" --clean --noupx neuragraph_ast.py

      - name: Rename Binary
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv internal/dist/neurabox_context.exe internal/dist/${{ matrix.asset_name }}
          else
            mv internal/dist/neurabox_context internal/dist/${{ matrix.asset_name }}
          fi
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: internal/dist/${{ matrix.asset_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}