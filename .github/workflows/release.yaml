name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: neurabox-windows.exe
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: neurabox-linux
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: neurabox-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: neurabox-macos
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: neurabox-macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ matrix.asset_name }} ./cmd/neurabox

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}