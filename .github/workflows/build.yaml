name: Build Binaries

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: neurabox-windows.exe
          # Linux x64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: neurabox-linux
          # Linux ARM64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: neurabox-linux-arm64
          # macOS x64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: neurabox-macos
          # macOS ARM64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: neurabox-macos-arm64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Binary
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ${{ matrix.asset_name }} .
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error