name: Build Multi-Platform Binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # Run all command line steps inside the 'internal' folder
    defaults:
      run:
        working-directory: ./internal

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: ''   # Checks out the whole repository

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true # 🌟 Replaces manual actions/cache safely for all 3 operating systems

      # Install the neuragraph package and all its dependencies
      - name: Install dependencies
        run: uv pip install -e . --system

      # PyInstaller is a dev dependency, install it explicitly
      - name: Install PyInstaller
        run: uv pip install pyinstaller --system

      # Windows build (semicolon separator, .exe extension)
      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: uv run pyinstaller --onefile --name neurabox_context --add-data "neuragraph;neuragraph" --clean --noupx neuragraph_ast.py

      # Linux & macOS build (colon separator, no extension)
      - name: Build Binary (Linux & macOS)
        if: matrix.os != 'windows-latest'
        run: uv run pyinstaller --onefile --name neurabox_context --add-data "neuragraph:neuragraph" --clean --noupx neuragraph_ast.py

      # Upload the generated binary as an artifact
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurabox_context-${{ matrix.os }}
          path: |
            internal/dist/neurabox_context
            internal/dist/neurabox_context.exe
          if-no-files-found: error