name: Build Multi-Platform Binaries

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from the GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    # This forces EVERY step below to run inside your 'internal' folder
    defaults:
      run:
        working-directory: ./internal

    strategy:
      matrix:
        # Spin up all three native host operating systems simultaneously
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # Step 1 needs to run from the absolute root to check out the full repo
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: '' # Checks out the root directory

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      # This now runs cleanly inside /internal because of the defaults layout above
      - name: Sync Dependencies
        run: uv pip install -r pyproject.toml --system

      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: uv run pyinstaller --onefile --name neurabox_context --add-data "neuragraph;neuragraph" --clean --noupx neuragraph_ast.py

      - name: Build Binary (Linux & macOS)
        if: matrix.os != 'windows-latest'
        run: uv run pyinstaller --onefile --name neurabox_context --add-data "neuragraph:neuragraph" --clean --noupx neuragraph_ast.py

      # Upload grabs the compiled binaries directly from the /internal/dist folder
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neurabox_context-${{ matrix.os }}
          path: |
            internal/dist/neurabox_context
            internal/dist/neurabox_context.exe
          if-no-files-found: error